version: "3.9"

# =============================================================================
# Cloud credential override for Aiven Kafka + ClickHouse Cloud
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# The base docker-compose.yml already defines the service topology and certificate
# mounts. This file keeps cloud credentials explicit for deployments that compose
# multiple env files or CI secrets.

services:
  backend:
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_NATIVE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9440}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}

  producer:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-binance_market_data}
      KAFKA_SSL_CA: /app/certs/ca.pem
      KAFKA_SSL_CERT: /app/certs/service.cert
      KAFKA_SSL_KEY: /app/certs/service.key
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS:-btcusdt,ethusdt,bnbusdt,solusdt,xrpusdt}
      BINANCE_INTERVAL: ${BINANCE_INTERVAL:-1m}

  processor:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-binance_market_data}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-market_processor}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      KAFKA_SSL_CA: /app/certs/ca.pem
      KAFKA_SSL_CERT: /app/certs/service.cert
      KAFKA_SSL_KEY: /app/certs/service.key
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
      STREAM_BATCH_SIZE: ${STREAM_BATCH_SIZE:-500}
      STREAM_POLL_TIMEOUT_S: ${STREAM_POLL_TIMEOUT_S:-5.0}

  ai-jobs:
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
