version: "3.9"

services:
  # ===========================================================================
  # Kafka UI — monitor topics / consumer lag (Aiven broker is external)
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aiven
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_0_SSL_TRUSTSTORELOCATION: /certs/ca.pem
      KAFKA_CLUSTERS_0_SSL_KEYSTORELOCATION: /certs/service.cert
      KAFKA_CLUSTERS_0_SSL_KEYSTOREPASSWORD: ""
    volumes:
      - ./jobs/ca.pem:/certs/ca.pem:ro
      - ./jobs/service.cert:/certs/service.cert:ro
      - ./jobs/service.key:/certs/service.key:ro

  # ===========================================================================
  # Go Backend API (Fiber — serves data from ClickHouse)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SERVICE_NAME: trading-dashboard
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-}
      CLICKHOUSE_NATIVE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9440}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
    restart: unless-stopped

  # ===========================================================================
  # Binance WebSocket → Kafka Producer (Aiven)
  # ===========================================================================
  producer:
    build:
      context: ./jobs
      dockerfile: Dockerfile.producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-binance_market_data}
      KAFKA_SSL_CA:   /app/certs/ca.pem
      KAFKA_SSL_CERT: /app/certs/service.cert
      KAFKA_SSL_KEY:  /app/certs/service.key
      BINANCE_SYMBOLS: btcusdt,ethusdt,bnbusdt,solusdt,xrpusdt
      BINANCE_INTERVAL: 1m
      LOG_LEVEL: INFO
    volumes:
      - ./jobs/ca.pem:/app/certs/ca.pem:ro
      - ./jobs/service.cert:/app/certs/service.cert:ro
      - ./jobs/service.key:/app/certs/service.key:ro
    restart: unless-stopped

  # ===========================================================================
  # Stream Processor (Kafka → ClickHouse)
  # ===========================================================================
  processor:
    build:
      context: ./jobs
      dockerfile: Dockerfile.processor
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC:          ${KAFKA_TOPIC:-binance_market_data}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-market_processor}
      KAFKA_SSL_CA:   /app/certs/ca.pem
      KAFKA_SSL_CERT: /app/certs/service.cert
      KAFKA_SSL_KEY:  /app/certs/service.key
      CLICKHOUSE_HOST:     ${CLICKHOUSE_HOST:-}
      CLICKHOUSE_PORT:     ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE:   ${CLICKHOUSE_SECURE:-true}
      STREAM_BATCH_SIZE:   500
      STREAM_POLL_TIMEOUT_S: "5.0"
      LOG_LEVEL: INFO
    volumes:
      - ./jobs/ca.pem:/app/certs/ca.pem:ro
      - ./jobs/service.cert:/app/certs/service.cert:ro
      - ./jobs/service.key:/app/certs/service.key:ro
    restart: unless-stopped

  # ===========================================================================
  # AI Jobs (signal scoring, anomaly detection, regime classification)
  # ===========================================================================
  ai-jobs:
    build:
      context: ./jobs
      dockerfile: Dockerfile.ai
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
      LOG_LEVEL: INFO
    restart: unless-stopped

